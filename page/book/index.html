<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子书库</title>
<script src="./js/epub.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

.header {
  text-align: center;
  color: white;
  margin-bottom: 40px;
}

.header h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.header p {
  font-size: 1.1rem;
  opacity: 0.9;
}

.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 30px;
  max-width: 1400px;
  margin: 0 auto;
}

.book-item {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: pointer;
}

.book-item:hover {
  transform: translateY(-10px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.book-cover {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  display: block;
}

.book-info {
  padding: 15px;
  text-align: center;
}

.book-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: #333;
  margin-bottom: 8px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.book-download {
  display: inline-block;
  padding: 8px 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  text-decoration: none;
  border-radius: 20px;
  font-size: 0.9rem;
  transition: opacity 0.3s ease;
  cursor: pointer;
  border: none;
}

.book-download:hover {
  opacity: 0.8;
}

/* 阅读器样式 */
.reader-container {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  z-index: 10000;
  flex-direction: column;
}

.reader-container.active {
  display: flex;
}

.reader-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 20px;
  background: #f5f5f5;
  border-bottom: 1px solid #ddd;
}

.reader-title {
  font-size: 1.2rem;
  font-weight: 600;
  color: #333;
}

.reader-close {
  background: #667eea;
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.9rem;
}

.reader-close:hover {
  opacity: 0.8;
}

.reader-content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

#viewer {
  width: 100%;
  height: 100%;
}

.reader-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(102, 126, 234, 0.9);
  color: white;
  border: none;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.reader-nav:hover {
  background: rgba(102, 126, 234, 1);
}

.reader-prev {
  left: 20px;
}

.reader-next {
  right: 20px;
}

.loading {
  text-align: center;
  color: white;
  font-size: 1.5rem;
  margin-top: 50px;
}

/* 响应式 */
@media (max-width: 768px) {
  .book-grid {
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px;
  }

  .header h1 {
    font-size: 2rem;
  }

  .reader-header {
    padding: 10px 15px;
  }

  .reader-title {
    font-size: 1rem;
  }

  .reader-close {
    padding: 6px 15px;
    font-size: 0.85rem;
  }

  .reader-nav {
    width: 40px;
    height: 40px;
    font-size: 1.2rem;
  }

  .reader-prev {
    left: 10px;
  }

  .reader-next {
    right: 10px;
  }

  #viewer {
    padding: 0 60px;
  }
}

@media (max-width: 480px) {
  .book-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
  }

  .header h1 {
    font-size: 1.5rem;
  }

  .header p {
    font-size: 0.9rem;
  }

  .reader-nav {
    width: 35px;
    height: 35px;
    font-size: 1rem;
  }

  .reader-prev {
    left: 5px;
  }

  .reader-next {
    right: 5px;
  }

  #viewer {
    padding: 0 50px;
  }
}
</style>
</head>
<body>
  <div class="header">
    <h1>📚 电子书库</h1>
    <p>点击阅读按钮在线阅读</p>
  </div>

  <div class="book-grid" id="book-grid">
    <div class="loading">加载中...</div>
  </div>

  <!-- 阅读器 -->
  <div class="reader-container" id="reader-container">
    <div class="reader-header">
      <div class="reader-title" id="reader-title">正在阅读</div>
      <button class="reader-close" onclick="closeReader()">关闭</button>
    </div>
    <div class="reader-content">
      <button class="reader-nav reader-prev" onclick="prevPage()">‹</button>
      <div id="viewer"></div>
      <button class="reader-nav reader-next" onclick="nextPage()">›</button>
    </div>
  </div>

  <script>
    const bookPath = '../../book/';
    let currentBook = null;
    let rendition = null;

    // 手动配置书籍列表（因为无法动态扫描文件夹）
    const bookList = [
      { folder: '怨气撞铃', title: '怨气撞铃', file: 'yuanqizhuangling.epub' }
      // 添加更多书籍时在这里添加
    ];

    // 初始化书籍展示
    function initBooks() {
      const bookGrid = document.getElementById('book-grid');
      bookGrid.innerHTML = '';

      if (bookList.length === 0) {
        bookGrid.innerHTML = '<div class="loading">暂无电子书</div>';
        return;
      }

      bookList.forEach(book => {
        const bookItem = document.createElement('div');
        bookItem.className = 'book-item';

        const coverPath = `${bookPath}${book.folder}/cover.jpg`;
        const epubPath = `${bookPath}${book.folder}/${book.file}`;

        bookItem.innerHTML = `
          <img class="book-cover" src="${coverPath}" alt="${book.title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22267%22%3E%3Crect fill=%22%23ddd%22 width=%22200%22 height=%22267%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2220%22%3E暂无封面%3C/text%3E%3C/svg%3E'">
          <div class="book-info">
            <div class="book-title" title="${book.title}">${book.title}</div>
            <button class="book-download" onclick="openReader('${epubPath}', '${book.title}')">在线阅读</button>
          </div>
        `;

        bookGrid.appendChild(bookItem);
      });
    }

    // 打开阅读器
    async function openReader(epubPath, title) {
      const readerContainer = document.getElementById('reader-container');
      const readerTitle = document.getElementById('reader-title');
      const viewer = document.getElementById('viewer');

      readerTitle.textContent = title;
      readerContainer.classList.add('active');
      document.body.style.overflow = 'hidden';

      // 清空之前的内容
      if (rendition) {
        rendition.destroy();
      }
      if (currentBook) {
        currentBook.destroy();
      }
      viewer.innerHTML = '';

      // 加载 epub
      currentBook = ePub(epubPath);
      rendition = currentBook.renderTo('viewer', {
        width: '100%',
        height: '100%',
        spread: 'none'
      });

      await rendition.display();

      // 键盘翻页
      document.removeEventListener('keydown', handleKeyPress);
      document.addEventListener('keydown', handleKeyPress);
    }

    // 关闭阅读器
    function closeReader() {
      const readerContainer = document.getElementById('reader-container');
      readerContainer.classList.remove('active');
      document.body.style.overflow = 'auto';

      if (rendition) {
        rendition.destroy();
        rendition = null;
      }

      if (currentBook) {
        currentBook.destroy();
        currentBook = null;
      }

      document.removeEventListener('keydown', handleKeyPress);
    }

    // 上一页
    function prevPage() {
      if (rendition) {
        rendition.prev();
      }
    }

    // 下一页
    function nextPage() {
      if (rendition) {
        rendition.next();
      }
    }

    // 键盘控制
    function handleKeyPress(e) {
      if (e.key === 'ArrowLeft') prevPage();
      if (e.key === 'ArrowRight') nextPage();
      if (e.key === 'Escape') closeReader();
    }

    // 初始化
    initBooks();
  </script>
</body>
</html>
