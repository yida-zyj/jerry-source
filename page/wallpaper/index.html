<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>壁纸展示</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

.header {
  text-align: center;
  color: white;
  margin-bottom: 40px;
}

.header h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.header p {
  font-size: 1.1rem;
  opacity: 0.9;
}

.waterfall {
  column-count: 4;
  column-gap: 15px;
  max-width: 1400px;
  margin: 0 auto;
}

.waterfall-item {
  break-inside: avoid;
  margin-bottom: 15px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.waterfall-item:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.waterfall-item img {
  width: 100%;
  display: block;
  border-radius: 12px;
}

.waterfall-item::after {
  content: '🔍';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.waterfall-item:hover::after {
  opacity: 0.9;
}

/* 灯箱样式 */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.lightbox.active {
  display: flex;
}

.lightbox-content {
  position: relative;
  max-width: 90%;
  max-height: 90%;
  animation: zoomIn 0.3s ease;
}

@keyframes zoomIn {
  from {
    transform: scale(0.8);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

.lightbox-content img {
  max-width: 100%;
  max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 10px 50px rgba(0,0,0,0.5);
}

.lightbox-close {
  position: absolute;
  top: -40px;
  right: 0;
  color: white;
  font-size: 2rem;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease;
}

.lightbox-close:hover {
  background: rgba(255,255,255,0.2);
}

.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: white;
  font-size: 3rem;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease;
  user-select: none;
}

.lightbox-nav:hover {
  background: rgba(255,255,255,0.2);
}

.lightbox-prev {
  left: -70px;
}

.lightbox-next {
  right: -70px;
}

.loading {
  text-align: center;
  color: white;
  font-size: 1.5rem;
  margin-top: 50px;
}

/* 响应式 */
@media (max-width: 1200px) {
  .waterfall {
    column-count: 3;
  }
}

@media (max-width: 768px) {
  .waterfall {
    column-count: 2;
  }

  .header h1 {
    font-size: 2rem;
  }

  .lightbox-prev {
    left: 10px;
  }

  .lightbox-next {
    right: 10px;
  }
}

@media (max-width: 480px) {
  .waterfall {
    column-count: 1;
  }
}
</style>
</head>
<body>
  <div class="header">
    <h1>✨ 精美壁纸</h1>
    <p>点击图片查看大图，左右切换浏览</p>
  </div>

  <div class="waterfall" id="waterfall">
    <div class="loading">加载中...</div>
  </div>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-content">
      <div class="lightbox-close" onclick="closeLightbox()">×</div>
      <div class="lightbox-prev" onclick="prevImage()">‹</div>
      <div class="lightbox-next" onclick="nextImage()">›</div>
      <img id="lightbox-img" src="" alt="壁纸">
    </div>
  </div>

  <script>
    const imagePath = '../../img/indexbg/';
    let images = [];
    let currentIndex = 0;

    // 自动扫描图片（1.jpg 到 65.jpg）
    async function loadImages() {
      const waterfall = document.getElementById('waterfall');
      waterfall.innerHTML = '';

      // 尝试加载图片，从1到100（预留空间）
      for (let i = 1; i <= 100; i++) {
        const imgSrc = `${imagePath}${i}.jpg`;

        // 检查图片是否存在
        const exists = await checkImageExists(imgSrc);
        if (exists) {
          images.push(imgSrc);

          const item = document.createElement('div');
          item.className = 'waterfall-item';
          item.onclick = () => openLightbox(images.length - 1);

          const img = document.createElement('img');
          img.src = imgSrc;
          img.alt = `壁纸 ${i}`;
          img.loading = 'lazy';

          item.appendChild(img);
          waterfall.appendChild(item);
        }
      }

      if (images.length === 0) {
        waterfall.innerHTML = '<div class="loading">暂无壁纸</div>';
      }
    }

    // 检查图片是否存在
    function checkImageExists(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    // 打开灯箱
    function openLightbox(index) {
      currentIndex = index;
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');

      lightboxImg.src = images[currentIndex];
      lightbox.classList.add('active');

      // 阻止背景滚动
      document.body.style.overflow = 'hidden';
    }

    // 关闭灯箱
    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // 上一张
    function prevImage() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      document.getElementById('lightbox-img').src = images[currentIndex];
    }

    // 下一张
    function nextImage() {
      currentIndex = (currentIndex + 1) % images.length;
      document.getElementById('lightbox-img').src = images[currentIndex];
    }

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      const lightbox = document.getElementById('lightbox');
      if (lightbox.classList.contains('active')) {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'ArrowRight') nextImage();
      }
    });

    // 点击背景关闭
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') {
        closeLightbox();
      }
    });

    // 加载图片
    loadImages();
  </script>
</body>
</html>
