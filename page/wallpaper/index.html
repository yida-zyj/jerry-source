<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>壁纸展示</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

.header {
  text-align: center;
  color: white;
  margin-bottom: 40px;
}

.header h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.header p {
  font-size: 1.1rem;
  opacity: 0.9;
}

.waterfall {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  max-width: 1400px;
  margin: 0 auto;
}

.waterfall-item {
  margin-bottom: 0;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f0f0f0;
}

.waterfall-item:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.waterfall-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 12px;
  position: absolute;
  top: 0;
  left: 0;
}

.waterfall-item::after {
  content: '🔍';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.waterfall-item:hover::after {
  opacity: 0.9;
}

/* 灯箱样式 */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  z-index: 9999;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.lightbox.active {
  display: flex;
}

.lightbox-content {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  max-width: 70%;
  max-height: 90%;
}

.lightbox-content img {
  max-width: 100%;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.lightbox-close {
  position: fixed;
  top: 30px;
  right: 30px;
  color: white;
  font-size: 2.5rem;
  cursor: pointer;
  background: rgba(255,255,255,0.2);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255,255,255,0.3);
  z-index: 10001;
  font-family: Arial, sans-serif;
  padding: 0;
  margin: 0;
}

.lightbox-close:hover {
  background: rgba(255,255,255,0.3);
}

.lightbox-nav {
  position: relative;
  color: white;
  cursor: pointer;
  background: rgba(255,255,255,0.25);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  user-select: none;
  backdrop-filter: blur(10px);
  border: 3px solid rgba(255,255,255,0.4);
  z-index: 10001;
  flex-shrink: 0;
}

.lightbox-nav:hover {
  background: rgba(255,255,255,0.4);
  transform: scale(1.1);
  box-shadow: 0 8px 30px rgba(255,255,255,0.3);
}

.lightbox-nav svg {
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}

.lightbox-prev {
  order: 1;
}

.lightbox-content {
  order: 2;
}

.lightbox-next {
  order: 3;
}

@media (max-width: 1200px) {
  .lightbox-content {
    max-width: 60%;
  }
}

.loading {
  text-align: center;
  color: white;
  font-size: 1.5rem;
  margin-top: 50px;
}

.load-more {
  text-align: center;
  margin: 40px 0;
}

.load-more-btn {
  background: rgba(255,255,255,0.2);
  color: white;
  border: 2px solid rgba(255,255,255,0.3);
  padding: 12px 40px;
  font-size: 1.1rem;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.load-more-btn:hover {
  background: rgba(255,255,255,0.3);
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.load-more-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* 响应式 */
@media (max-width: 1200px) {
  .waterfall {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 768px) {
  .waterfall {
    grid-template-columns: repeat(2, 1fr);
  }

  .header h1 {
    font-size: 2rem;
  }

  .lightbox-prev {
    left: 10px;
  }

  .lightbox-next {
    right: 10px;
  }
}

@media (max-width: 480px) {
  .waterfall {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
  <div class="header">
    <h1>✨ 看看壁纸吧</h1>
    <p>点击图片查看大图，左右切换浏览</p>
  </div>

  <div class="waterfall" id="waterfall">
    <div class="loading">加载中...</div>
  </div>

  <div class="load-more" id="load-more-container" style="display: none;">
    <button class="load-more-btn" id="load-more-btn" onclick="loadMoreImages()">加载更多</button>
  </div>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" onclick="closeLightbox()">×</div>
    <div class="lightbox-prev" onclick="prevImage()">
      <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </div>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="壁纸">
    </div>
    <div class="lightbox-next" onclick="nextImage()">
      <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </div>
  </div>

  <script>
    const imagePath = '../../img/indexbg/';
    let allImages = [];
    let displayedImages = [];
    let currentIndex = 0;
    let currentPage = 0;
    const pageSize = 20; // 每页显示20张

    // 初始化：扫描所有图片
    async function initImages() {
      const waterfall = document.getElementById('waterfall');
      waterfall.innerHTML = '<div class="loading">加载图片中...</div>';

      // 扫描所有图片（从100到1，倒序，最新的在前）
      for (let i = 100; i >= 1; i--) {
        const imgSrc = `${imagePath}${i}.jpg`;
        const exists = await checkImageExists(imgSrc);
        if (exists) {
          allImages.push({ src: imgSrc, index: i });
        }
      }

      if (allImages.length === 0) {
        waterfall.innerHTML = '<div class="loading">暂无壁纸</div>';
        return;
      }

      // 加载第一页
      loadMoreImages();
    }

    // 加载更多图片
    function loadMoreImages() {
      const waterfall = document.getElementById('waterfall');
      const loadMoreContainer = document.getElementById('load-more-container');
      const loadMoreBtn = document.getElementById('load-more-btn');

      // 清除加载提示
      if (currentPage === 0) {
        waterfall.innerHTML = '';
      }

      // 计算当前页的图片
      const start = currentPage * pageSize;
      const end = Math.min(start + pageSize, allImages.length);
      const pageImages = allImages.slice(start, end);

      // 渲染图片
      pageImages.forEach((imgData, idx) => {
        const globalIndex = start + idx;
        displayedImages.push(imgData.src);

        const item = document.createElement('div');
        item.className = 'waterfall-item';
        item.onclick = () => openLightbox(globalIndex);

        const img = document.createElement('img');
        img.src = imgData.src;
        img.alt = `壁纸 ${imgData.index}`;
        img.loading = 'lazy';

        item.appendChild(img);
        waterfall.appendChild(item);
      });

      currentPage++;

      // 显示/隐藏加载更多按钮
      if (end >= allImages.length) {
        loadMoreContainer.style.display = 'none';
      } else {
        loadMoreContainer.style.display = 'block';
      }
    }

    // 检查图片是否存在
    function checkImageExists(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    // 打开灯箱
    function openLightbox(index) {
      currentIndex = index;
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');

      lightboxImg.src = displayedImages[currentIndex];
      lightbox.classList.add('active');

      // 阻止背景滚动
      document.body.style.overflow = 'hidden';
    }

    // 关闭灯箱
    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // 上一张
    function prevImage() {
      if (currentIndex > 0) {
        currentIndex--;
      } else {
        // 已经是第一张，循环到最后
        currentIndex = displayedImages.length - 1;
      }
      document.getElementById('lightbox-img').src = displayedImages[currentIndex];
    }

    // 下一张
    async function nextImage() {
      if (currentIndex < displayedImages.length - 1) {
        currentIndex++;
      } else {
        // 已经是最后一张，检查是否还有更多图片
        if (displayedImages.length < allImages.length) {
          // 还有更多图片，加载下一页
          loadMoreImages();
          currentIndex++;
        } else {
          // 没有更多了，循环到第一张
          currentIndex = 0;
        }
      }
      document.getElementById('lightbox-img').src = displayedImages[currentIndex];
    }

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      const lightbox = document.getElementById('lightbox');
      if (lightbox.classList.contains('active')) {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'ArrowRight') nextImage();
      }
    });

    // 点击背景关闭
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') {
        closeLightbox();
      }
    });

    // 初始化
    initImages();
  </script>
</body>
</html>
